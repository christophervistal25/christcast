name: Bug Report
description: Report a reproducible bug in chriscast
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the form below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of chriscast are you running? (output of `chriscast --version` or commit SHA)
      placeholder: "e.g. 1.2.3 or commit abc1234"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: OS / Desktop Environment / Display Server
      description: Which environment are you running on?
      options:
        - Linux / GNOME / Wayland
        - Linux / GNOME / X11
        - Linux / KDE Plasma / Wayland
        - Linux / KDE Plasma / X11
        - Linux / XFCE / X11
        - Linux / Sway / Wayland
        - Linux / Hyprland / Wayland
        - Linux / i3 / X11
        - Linux / Other / Wayland
        - Linux / Other / X11
        - Other (please describe in reproduction steps)
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Run `chriscast ...`
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Traces
      description: Paste any relevant logs, console output, or stack traces. This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched the existing issues and confirmed this is not a duplicate.
          required: true
